<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>랑그릿사 II 게임 데이터 편집기</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>랑그릿사 II 게임 데이터 편집기</h1>
      <p id="sourcePath">ROM 정보를 읽는 중</p>
    </div>
    <button id="buildButton" type="button">편집 ROM 빌드</button>
  </header>

  <main>
    <section class="controls sourceControls" aria-label="기준 ROM 선택">
      <label>기준 ROM
        <select id="romSelect">
          <option value="korean">한국어 최신 빌드</option>
          <option value="japanese">일본어 원본</option>
        </select>
      </label>
    </section>

    <nav class="tabs" aria-label="편집 영역">
      <button class="tab active" type="button" data-tab="scenario">시나리오</button>
      <button class="tab" type="button" data-tab="items">아이템</button>
      <button class="tab" type="button" data-tab="classes">클래스 체인지</button>
      <button class="tab" type="button" data-tab="testClasses">테스트 체인지</button>
      <button class="tab" type="button" data-tab="aiClasses">AI 클래스</button>
    </nav>
    <div id="notice" class="notice" hidden></div>

    <section id="scenarioPanel" class="tabPanel active">
      <div class="controls">
        <label>시나리오
          <select id="scenarioSelect"></select>
        </label>
        <label>표시
          <select id="filterSelect">
            <option value="all">전체 배치</option>
            <option value="enemy">적군</option>
            <option value="event">NPC / 이벤트</option>
          </select>
        </label>
        <span id="recordSummary" class="summary"></span>
      </div>
      <div class="tableWrap" aria-label="배치 데이터">
        <table class="scenarioTable">
          <thead>
            <tr>
              <th>배치</th><th>이름</th><th>클래스</th><th>LV</th>
              <th>AT</th><th>DF</th><th>좌표</th><th>용병 1</th><th>용병 2</th><th>용병 3</th>
              <th>용병 4</th><th>용병 5</th><th>용병 6</th><th>ROM</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
    </section>

    <section id="itemsPanel" class="tabPanel">
      <div class="controls">
        <label>분류
          <select id="itemFilter">
            <option value="all">전체 아이템</option>
            <option value="무기">무기</option>
            <option value="방어구">방어구</option>
            <option value="장신구">장신구</option>
          </select>
        </label>
        <span id="itemSummary" class="summary"></span>
      </div>
      <div class="tableWrap" aria-label="아이템 데이터">
        <table class="itemTable">
          <thead>
            <tr>
              <th>ID</th><th>그림</th><th>분류</th><th>이름</th><th>가격</th>
              <th>효과 1</th><th>효과 2</th><th>효과 3</th><th>효과 4</th>
              <th>별도 동작</th><th>ROM</th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
    </section>

    <section id="classesPanel" class="tabPanel">
      <div class="controls">
        <label>지휘관
          <select id="commanderSelect"></select>
        </label>
        <span id="classSummary" class="summary"></span>
      </div>
      <div class="classWorkspace">
        <div class="classTreeWrap" aria-label="클래스 체인지 트리">
          <div class="tierLabels">
            <span>1단계</span><span>2단계</span><span>3단계</span>
            <span>4단계</span><span>숨은 5단계</span>
          </div>
          <div id="classTree" class="classTree">
            <svg id="classEdges" class="classEdges" aria-hidden="true"></svg>
          </div>
        </div>
        <aside id="classInspector" class="classInspector">
          <h2>클래스를 선택하세요</h2>
        </aside>
      </div>
    </section>

    <section id="testClassesPanel" class="tabPanel">
      <div class="controls">
        <label>지휘관
          <select id="testCommanderSelect"></select>
        </label>
        <span id="testClassSummary" class="summary"></span>
      </div>
      <div class="classWorkspace testClassWorkspace">
        <div class="classTreeWrap" aria-label="새 클래스 디자인 비교 트리">
          <div class="tierLabels">
            <span>1단계</span><span>2단계</span><span>3단계</span>
            <span>4단계</span><span>숨은 5단계</span>
          </div>
          <div id="testClassTree" class="classTree">
            <svg id="testClassEdges" class="classEdges" aria-hidden="true"></svg>
          </div>
        </div>
        <aside id="testClassInspector" class="classInspector">
          <h2>클래스를 선택하세요</h2>
        </aside>
      </div>
    </section>

    <section id="aiClassesPanel" class="tabPanel">
      <div class="controls">
        <label>지휘관
          <select id="aiCommanderSelect"></select>
        </label>
        <span id="aiClassSummary" class="summary"></span>
      </div>
      <div class="classWorkspace aiClassWorkspace">
        <div class="classTreeWrap" aria-label="AI 클래스 디자인 비교 트리">
          <div class="tierLabels">
            <span>1단계</span><span>2단계</span><span>3단계</span>
            <span>4단계</span><span>숨은 5단계</span>
          </div>
          <div id="aiClassTree" class="classTree">
            <svg id="aiClassEdges" class="classEdges" aria-hidden="true"></svg>
          </div>
        </div>
        <aside id="aiClassInspector" class="classInspector">
          <h2>클래스를 선택하세요</h2>
        </aside>
      </div>
    </section>
  </main>
  <div id="assetPicker" class="assetPicker" hidden>
    <input id="assetPickerSearch" type="search" placeholder="ID 또는 이름 검색">
    <div id="assetPickerOptions" class="assetPickerOptions"></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
